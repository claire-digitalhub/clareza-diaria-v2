    <!-- FIX BUG 1: GA Consent Mode v2 — analytics bloqueado por padrão (LGPD) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Nega coleta por padrão (LGPD compliance)
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        wait_for_update: 500,
      });

      // Restaura consentimento de sessões anteriores, antes do GA disparar
      try {
        if (localStorage.getItem('clareza-diaria-ga-consent') === 'granted') {
          gtag('consent', 'update', { analytics_storage: 'granted' });
        }
      } catch (_) {}

      gtag('js', new Date());
      gtag('config', 'G-0S3BL3CNGK');
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0S3BL3CNGK"></script>
